<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard – Trivia Night</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="screen active">
  <div class="card">
    <h1>🏆 Leaderboard</h1>
    <p class="subtitle">All-time top scores</p>
    <div id="leaderboard-list"><p>Loading…</p></div>
    <a href="/" class="btn btn-secondary" style="display:inline-block;margin-top:1rem;">← Back to Home</a>
  </div>
</div>
<script>
  async function loadLeaderboard() {
    try {
      const res = await fetch('/api/scores/history?limit=10');
      if (!res.ok) throw new Error('Failed to fetch scores');
      const scores = await res.json();
      const el = document.getElementById('leaderboard-list');
      if (!scores.length) {
        el.innerHTML = '<p>No scores yet. Play a game to get on the board!</p>';
        return;
      }
      el.innerHTML = '<ol>' + scores.map(s =>
        `<li><strong>${s.nickname || s.playerName}</strong> — ${s.score} pts</li>`
      ).join('') + '</ol>';
    } catch (err) {
      document.getElementById('leaderboard-list').innerHTML = '<p>Unable to load scores.</p>';
    }
  }
  loadLeaderboard();
</script>
</body>
</html>
