<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Night 🎉</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SCREEN: Home -->
<div id="screen-home" class="screen active">
  <div class="card">
    <h1>🎉 Trivia Night</h1>
    <p class="subtitle">Multiplayer Quiz Game</p>
    <button class="btn btn-primary" onclick="showCreateRoom()">Create Room</button>
    <button class="btn btn-secondary" onclick="showJoinRoom()">Join Room</button>
    <button class="btn btn-spectator" onclick="showSpectatorJoin()">👁️ Watch as Spectator</button>
  </div>
</div>

<!-- SCREEN: Create Room -->
<div id="screen-create" class="screen">
  <div class="card">
    <h2>🏠 Create Room</h2>
    <input id="host-name" type="text" placeholder="Your display name" maxlength="20">
    <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    <button class="btn btn-ghost" onclick="showHome()">← Back</button>
  </div>
</div>

<!-- SCREEN: Join Room -->
<div id="screen-join" class="screen">
  <div class="card">
    <h2>🚪 Join Room</h2>
    <input id="join-code" type="text" placeholder="6-character code" maxlength="6" style="text-transform:uppercase">
    <input id="player-name" type="text" placeholder="Your display name" maxlength="20">
    <button class="btn btn-primary" onclick="joinRoom()">Join</button>
    <button class="btn btn-ghost" onclick="showHome()">← Back</button>
  </div>
</div>

<!-- SCREEN: Spectator Join -->
<div id="screen-spectator-join" class="screen">
  <div class="card card-spectator">
    <h2>👁️ Watch as Spectator</h2>
    <input id="spectator-join-code" type="text" placeholder="6-character game code" maxlength="6" style="text-transform:uppercase">
    <input id="spectator-display-name" type="text" placeholder="Display name (optional)" maxlength="20">
    <div id="spectator-error" class="spectator-error hidden"></div>
    <button class="btn btn-watch" onclick="joinAsSpectator()">Watch</button>
    <button class="btn btn-ghost" onclick="showHome()">← Back</button>
  </div>
</div>

<!-- SCREEN: Lobby -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <h2>🎮 Game Lobby</h2>
    <div class="join-code-display">
      <span class="label">Join Code:</span>
      <span id="lobby-code" class="code"></span>
    </div>
    <div id="player-list" class="player-list"></div>
    <div id="host-controls" class="hidden">
      <button class="btn btn-primary" onclick="startGame()" id="start-btn">Start Game</button>
      <p class="hint">Need at least 1 player. Up to 8 can join.</p>
    </div>
    <div id="waiting-msg" class="hidden">
      <p class="hint">⏳ Waiting for host to start the game…</p>
    </div>
  </div>
</div>

<!-- SCREEN: Question -->
<div id="screen-question" class="screen">
  <div class="question-header">
    <div id="q-category" class="category-badge"></div>
    <div id="q-progress" class="progress-text"></div>
    <div id="timer-bar-wrap">
      <div id="timer-bar"></div>
      <span id="timer-text">30</span>
    </div>
  </div>
  <div class="card question-card">
    <p id="q-text" class="question-text"></p>
    <div id="options-grid" class="options-grid"></div>
    <div id="answer-feedback" class="feedback hidden"></div>
  </div>
</div>

<!-- SCREEN: Leaderboard (between questions) -->
<div id="screen-leaderboard" class="screen">
  <div class="card">
    <h2>📊 Leaderboard</h2>
    <div id="leaderboard-list" class="leaderboard-list"></div>
    <p class="hint" id="next-q-hint">Next question coming up…</p>
  </div>
</div>

<!-- SCREEN: Game Over / Podium -->
<div id="screen-gameover" class="screen">
  <div class="card">
    <h2>🏆 Final Results</h2>
    <div id="podium" class="podium"></div>
    <div id="full-leaderboard" class="leaderboard-list"></div>
    <button class="btn btn-primary" onclick="showHome()">Play Again</button>
  </div>
</div>

<div id="reconnect-banner" class="reconnect-banner hidden">
  🔄 Reconnecting…
</div>

<script src="app.js"></script>
</body>
</html>
